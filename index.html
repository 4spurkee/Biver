<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biver</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Trebuchet MS';
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s ease;
}

/* ===== THEMES ===== */

body[data-theme="green"] {
    background: linear-gradient(135deg, #3b4a1f, #1f2a12);
    color: #f3e7b3;
}

body[data-theme="space"] {
    background: radial-gradient(circle at top, #1b1f3a, #0a0d1a, #000);
    color: #d7e1ff;
}

body[data-theme="goose"] {
    background: url("Goose.png") center/cover no-repeat fixed;
    color: #3a2f10;
}

body[data-theme="goose"]::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.75);
    pointer-events: none;
}

/* ===== TOP BAR ===== */

.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 18px 25px;
    background: rgba(25, 35, 12, 0.9);
    backdrop-filter: blur(10px);
}

.brand {
    display: flex;
    flex-direction: column;
}

.brand h1 {
    font-size: 34px;
    color: #ffe9a3;
}

.brand span {
    font-size: 13px;
    opacity: 0.8;
}

/* ===== CHAT ===== */

#chat-container {
    margin-top: 110px;
    margin-bottom: 80px;
    flex: 1;
    padding: 25px;

    display: flex;
    flex-direction: column;
    gap: 14px;
}

.message {
    background: rgba(0,0,0,0.2);
    border: 1px solid #d6b65a;
    padding: 12px;
    border-radius: 12px;
    max-width: 80%;
}

/* ===== INPUT ===== */

#chat-form {
    position: fixed;
    bottom: 0;
    width: 100%;

    display: flex;
    gap: 10px;

    padding: 15px;
    background: rgba(25, 35, 12, 0.95);
}

#message {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
}

/* ===== SETTINGS ===== */

.settings {
    display: flex;
    gap: 8px;
}

button {
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="brand">
        <h1>Biver</h1>
        <span>a shitty html parody</span>
    </div>

    <div class="settings">
        <button onclick="setTheme('green')">🟢</button>
        <button onclick="setTheme('space')">🌌</button>
        <button onclick="setTheme('goose')">🪿</button>
    </div>
</div>

<div id="chat-container"></div>

<form id="chat-form">
    <input id="message" placeholder="Write message..." required>
    <button>Send</button>
</form>

<script src="ChatEngine.js"></script>

<script>
const chatContainer = document.getElementById('chat-container');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message');

/* MESSAGE RENDER */
ChatEngine.onNewMessage = function(msg) {
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `[${msg.date} ${msg.time}] <b>${msg.username}</b>: ${msg.text}`;
    chatContainer.appendChild(div);
};

/* SEND */
chatForm.onsubmit = async (e) => {
    e.preventDefault();
    await ChatEngine.send(messageInput.value);
    messageInput.value = '';
};

/* THEME */
window.setTheme = async function(theme) {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;

    await supabaseClient
        .from('profiles')
        .update({ theme })
        .eq('id', user.id);

    ChatEngine.applyTheme(theme);
};

/* START */
ChatEngine.init();
</script>

</body>
</html>
