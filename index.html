<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Biver</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<style>

:root{

--bg1:#3b4a1f;
--bg2:#1f2a12;

--panel:#1f2a12;
--panel2:#2f3a17;

--text:#f3e7b3;

--accent:#d6b65a;
--accent2:#ffe08a;

}

/* BLOODBATH */

body.theme-bloodbath{

--bg1:#190000;
--bg2:#050000;

--panel:#130000;
--panel2:#250000;

--text:#ffd3d3;

--accent:#990000;
--accent2:#ff3d3d;

}

/* GOOSE */

body.theme-goose{

--bg1:#ffffff;
--bg2:#f6f1df;

--panel:#fffdf7;
--panel2:#ece3c4;

--text:#7d6312;

--accent:#d4af37;
--accent2:#ffd85d;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:

linear-gradient(
135deg,
var(--bg1),
var(--bg2)
);

color:var(--text);

font-family:'Trebuchet MS';

min-height:100vh;

display:flex;
flex-direction:column;

transition:.25s ease;

}

.top-bar{

position:fixed;

top:0;
left:0;

width:100%;

z-index:1000;

display:flex;

justify-content:
space-between;

align-items:center;

padding:18px 25px;

background:
rgba(25,35,12,.9);

backdrop-filter:
blur(10px);

border-bottom:

1px solid
var(--accent);

}

.brand{

display:flex;

flex-direction:
column;

}

.brand h1{

font-size:34px;

background:

linear-gradient(
90deg,
#ffde84,
#f9dd8a
);

-webkit-background-clip:text;

-webkit-text-fill-color:
transparent;

}

.brand span{

font-size:13px;

opacity:.8;

}

.settings-btn{

width:42px;
height:42px;

padding:0;

border-radius:10px;

font-size:18px;

display:flex;

align-items:center;
justify-content:center;

}

#chat-container{

margin-top:110px;

margin-bottom:80px;

flex:1;

padding:25px;

overflow-y:auto;

display:flex;

flex-direction:column;

gap:14px;

}

.message{

background:

linear-gradient(
135deg,
var(--panel2),
var(--panel)
);

border:

1px solid
var(--accent);

border-radius:14px;

padding:14px 18px;

max-width:80%;

width:fit-content;

color:var(--text);

line-height:1.5;

}

#chat-form{

position:fixed;

bottom:0;

width:100%;

display:flex;

gap:10px;

padding:15px;

background:
rgba(25,35,12,.95);

backdrop-filter:
blur(10px);

border-top:

1px solid
var(--accent);

}

#message{

flex:1;

padding:10px 12px;

border-radius:10px;

outline:none;

}

button,
#message,
#settings-panel input{

border:

2px solid
var(--accent);

background:

var(--panel);

color:

var(--text);

border-radius:10px;

padding:10px 12px;

transition:.2s;

}

button{

cursor:pointer;

}

button:hover{

border-color:

var(--accent2);

transform:

translateY(-1px);

}

#settings-backdrop{

position:fixed;

inset:0;

background:
rgba(0,0,0,.55);

opacity:0;

pointer-events:none;

transition:.2s;

z-index:99998;

}

#settings-backdrop.open{

opacity:1;

pointer-events:auto;

}

#settings-panel{

position:fixed;

top:50%;
left:50%;

width:360px;

max-width:
calc(100vw - 20px);

background:
rgba(25,35,12,.98);

border:

2px solid
var(--accent);

border-radius:14px;

padding:12px;

display:flex;

flex-direction:column;

gap:10px;

transform:

translate(
-50%,
-52%
)
scale(.96);

opacity:0;

pointer-events:none;

overflow:auto;

z-index:99999;

transition:.25s;

}

#settings-panel.open{

opacity:1;

pointer-events:auto;

transform:

translate(
-50%,
-50%
)
scale(1);

}

.tab-buttons{

display:flex;

gap:6px;

}

.tab-buttons button{

flex:1;

}

.hidden{

display:none;

}

.tab-content{

display:flex;

flex-direction:column;

gap:8px;

}

#current-user{

padding:10px;

border:

1px solid
var(--accent);

border-radius:10px;

text-align:center;

}

.auth-buttons{

display:flex;

gap:8px;

}

.auth-buttons button{

flex:1;

}

.theme-btn{

width:100%;

padding:12px;

font-size:15px;

}

@media(max-width:700px){

#settings-panel{

width:

calc(
100vw - 20px
);

}

}

</style>
</head>

<body>

<div class="top-bar">

<div class="brand">

<h1>Biver</h1>

<span>
a shitty html parody
</span>

</div>

<button
id="settings-btn"
class="settings-btn"
type="button"
>

⚙

</button>

</div>

<div id="chat-container"></div>

<form id="chat-form">

<input
id="message"
type="text"
placeholder="Write text or HTML..."
required
>

<button>

Send

</button>

</form>

<div id="settings-backdrop"></div>

<div id="settings-panel"> <div class="tab-buttons"> <button type="button" class="settings-tab active" data-tab="account">Account</button> <button type="button" class="settings-tab" data-tab="themes">Themes</button> </div> <div id="tab-account" class="tab-content"> <div id="current-user">Not logged in</div> <input type="email" id="email" placeholder="email"> <input type="password" id="password" placeholder="password"> <div class="auth-buttons"> <button id="login-btn" type="button">Login</button> <button id="signup-btn" type="button">Sign up</button> <button id="logout-btn" type="button">Logout</button> </div> </div> <div id="tab-themes" class="tab-content hidden">

    <button
        class="theme-btn"
        data-theme="default"
        type="button"
    >
        🟢 Default
    </button>

    <button
        class="theme-btn"
        data-theme="bloodbath"
        type="button"
    >
        🔴 Bloodbath
    </button>

    <button
        class="theme-btn"
        data-theme="goose"
        type="button"
    >
        🪿 Goose
    </button>

</div> </div> </div>

<script src="ChatEngine.js"></script>
<script src="script.js"></script>

</body>
</html>
