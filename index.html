<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Frontend Tasks</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* OLIVE GREEN GRADIENT */
            background: linear-gradient(135deg, #3b4a1f, #1f2a12);
            color: #f3e7b3;
            font-family: 'Trebuchet MS';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 48px;
            text-align: center;
            margin: 25px 0;

            /* YELLOW / TAN GRADIENT TEXT */
            background: linear-gradient(90deg, #ffd86b, #d6b65a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
        }

        label {
            font-size: 18px;
            color: #f3e7b3;
        }

        input {
            background: #1f2a12;
            border: 2px solid #d6b65a;
            color: #ffe9a3;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s ease;
            font-size: 15px;
        }

        input:focus {
            border-color: #ffe08a;
            box-shadow: 0 0 12px rgba(255, 216, 107, 0.2);
        }

        #username {
            width: 260px;
            text-align: center;
        }

        hr {
            border: none;
            height: 1px;
            background: #d6b65a;
            opacity: 0.5;
            margin: 15px 20px;
        }

        /* CHAT AREA */
        #chat-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #chat-container img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        /* MESSAGE */
        .message {
            background: linear-gradient(135deg, #2f3a17, #1c250f);
            border: 1px solid #d6b65a;
            border-radius: 14px;
            padding: 14px 18px;
            max-width: 80%;
            width: fit-content;

            color: #ffe9a3;
            font-size: 15px;
            line-height: 1.5;

            transition: 0.4s ease;
        }

        .message:hover {
            background: linear-gradient(135deg, #3a4620, #242f14);
            border-color: #ffe08a;
        }

        /* HISTORY BUTTON */
        .history-info {
            color: #ffe9a3;
            background: linear-gradient(135deg, #2a3315, #1c250f);
            padding: 10px 18px;
            text-align: center;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 10px;
            border: 1px solid #d6b65a;

            transition: 0.5s ease;
        }

        .history-info:hover {
            background: linear-gradient(135deg, #3a4620, #2a3315);
            border-color: #ffe08a;
            color: #fff3c4;
        }

        /* INPUT BAR */
        #chat-form {
            position: sticky;
            bottom: 0;
            width: 100%;

            display: flex;
            gap: 30px;

            padding: 18px 25px;

            background: rgba(25, 35, 12, 0.95);
            backdrop-filter: blur(10px);

            border-top: 1px solid #d6b65a;
        }

        #message {
            flex: 1;
        }

        /* BUTTON */
        button {
            min-width: 160px;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            border: 2px solid #d6b65a;
            border-radius: 12px;

            padding: 12px 20px;

            cursor: pointer;

            transition: 0.4s ease;

            font-size: 15px;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
            border-color: #ffe08a;
            color: #fff3c4;
        }

        /* MOBILE */
        @media (max-width: 700px) {
            h2 {
                font-size: 34px;
            }

            #chat-form {
                flex-direction: column;
                gap: 12px;
            }

            #message,
            button,
            #username {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="controls">
        <h2>Local Forum</h2>
    </div>

    <div class="top-section">
        <label for="username">Nickname</label>
        <input type="text" id="username" placeholder="Enter nickname">
    </div>

    <hr>

    <div id="chat-container"></div>

    <form id="chat-form">
        <input type="text" id="message" placeholder="Write text or HTML..." autocomplete="off" required>
        <button type="submit">Send</button>
    </form>

    <script src="ChatEngine.js"></script>
    <script src="script.js"></script>

</body>

</html>
