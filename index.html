<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biver</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1f2a12;
            color: #ffe9a3;
        }

        #chat-container {
            padding: 100px 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px;
            border: 1px solid #d6b65a;
            border-radius: 10px;
            background: #2f3a17;
        }

        #chat-form {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #111;
        }

        #message {
            flex: 1;
            padding: 10px;
        }

        button {
            width: 50px;
        }

        .history-info {
            padding: 10px;
            border: 1px solid #d6b65a;
            text-align: center;
            cursor: pointer;
            background: #3a4620;
        }
    </style>
</head>

<body>

<div id="chat-container"></div>

<form id="chat-form">
    <input id="username" placeholder="username">
    <input id="message" placeholder="message">
    <button>➤</button>
</form>

<script src="ChatEngine.js"></script>
<script src="script.js"></script>

</body>
</html>
