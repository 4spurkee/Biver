<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biver</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #3b4a1f, #1f2a12);
            color: #f3e7b3;
            font-family: 'Trebuchet MS';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ================= TOP BAR (NEW) ================= */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 25px;

            background: rgba(25, 35, 12, 0.9);
            backdrop-filter: blur(10px);

            border-bottom: 1px solid #d6b65a;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-size: 34px;
            background: linear-gradient(90deg, #ffde84, #f9dd8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 13px;
            color: #ffe9a3;
            opacity: 0.8;
        }

        #username {
            width: 160px;
            padding: 8px 10px;
            border-radius: 10px;

            background: #1f2a12;
            border: 2px solid #d6b65a;
            color: #ffe9a3;

            text-align: center;
            outline: none;
        }

        /* PUSH CHAT BELOW TOP BAR */
        #chat-container {
            margin-top: 110px;
            margin-bottom: 80px;
            flex: 1;
            padding: 25px;

            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ================= CHAT (UNCHANGED) ================= */
        #chat-container img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        .message {
            background: linear-gradient(135deg, #2f3a17, #1c250f);
            border: 1px solid #d6b65a;
            border-radius: 14px;
            padding: 14px 18px;
            max-width: 80%;
            width: fit-content;

            color: #ffe9a3;
            font-size: 15px;
            line-height: 1.5;

            transition: 0.4s ease;
        }

        .message:hover {
            background: linear-gradient(135deg, #3a4620, #242f14);
            border-color: #ffe08a;
        }

        /* ================= INPUT BAR (UPDATED) ================= */
        #chat-form {
            position: fixed;
            bottom: 0;
            width: 100%;

            display: flex;
            gap: 10px;

            padding: 15px;

            background: rgba(25, 35, 12, 0.95);
            backdrop-filter: blur(10px);

            border-top: 1px solid #d6b65a;
        }

        #message {
            flex: 1;
            padding: 12px 14px;

            border-radius: 12px;
            border: 2px solid #d6b65a;

            background: #1f2a12;
            color: #ffe9a3;

            outline: none;
        }

        /* ICON SEND BUTTON */
        button {
            width: 46px;
            height: 46px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 12px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);

            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }

        button svg {
            width: 18px;
            height: 18px;
            fill: #ffe9a3;
        }

        /* MOBILE */
        @media (max-width: 700px) {
            #username {
                width: 120px;
            }

            #chat-container {
                margin-top: 140px;
            }
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">

        <div class="brand">
            <h1>Biver</h1>
            <span>a shitty html parody</span>
        </div>

        <input type="text" id="username" placeholder="nickname">

    </div>

    <!-- CHAT (UNCHANGED) -->
    <div id="chat-container"></div>

    <!-- INPUT -->
    <form id="chat-form">
        <input type="text" id="message" placeholder="Write text or HTML..." autocomplete="off" required>

        <button type="submit">
            <svg viewBox="0 0 24 24">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
            </svg>
        </button>
    </form>

    <script src="ChatEngine.js"></script>
    <script src="script.js"></script>

</body>

</html>
