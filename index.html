<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biver</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #3b4a1f, #1f2a12);
            color: #f3e7b3;
            font-family: 'Trebuchet MS';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 25px;

            background: rgba(25, 35, 12, 0.9);
            backdrop-filter: blur(10px);

            border-bottom: 1px solid #d6b65a;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-size: 34px;
            background: linear-gradient(90deg, #ffde84, #f9dd8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 13px;
            color: #ffe9a3;
            opacity: 0.8;
        }

        #auth-box {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        #auth-box input,
        #message {
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid #d6b65a;
            background: #1f2a12;
            color: #ffe9a3;
            outline: none;
        }

        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }

        #chat-container {
            margin-top: 110px;
            margin-bottom: 80px;

            flex: 1;
            padding: 25px;

            overflow-y: auto;

            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            background: linear-gradient(135deg, #2f3a17, #1c250f);

            border: 1px solid #d6b65a;
            border-radius: 14px;

            padding: 14px 18px;

            max-width: 80%;
            width: fit-content;

            color: #ffe9a3;
            line-height: 1.5;
        }

        #chat-form {
            position: fixed;
            bottom: 0;
            width: 100%;

            display: flex;
            gap: 10px;

            padding: 15px;

            background: rgba(25, 35, 12, 0.95);
            backdrop-filter: blur(10px);

            border-top: 1px solid #d6b65a;
        }

        #message {
            flex: 1;
        }

        .history-info {
            margin: 0 25px 14px;
            padding: 12px 16px;

            border-radius: 12px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            text-align: center;
            font-size: 14px;
            font-weight: 600;

            cursor: pointer;
            transition: 0.3s ease;
        }

        .history-info:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }
    </style>
</head>

<body>

    <div class="top-bar">

        <div class="brand">
            <h1>Biver</h1>
            <span>a shitty html parody</span>
        </div>

        <div id="auth-box">
            <input type="email" id="email" placeholder="email">
            <input type="password" id="password" placeholder="password">

            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign up</button>
            <button id="logout-btn">Logout</button>
        </div>

    </div>

    <div id="chat-container"></div>

    <form id="chat-form">

        <input
            type="text"
            id="message"
            placeholder="Write text or HTML..."
            autocomplete="off"
            required
        >

        <button type="submit">Send</button>

    </form>

    <script>

        const SUPABASE_URL = 'https://gkfifjfxwtlkoevhalzu.supabase.co';
        const SUPABASE_KEY = 'YOUR_PUBLIC_KEY';
        const TABLE_NAME = 'messages';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message');

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const logoutBtn = document.getElementById('logout-btn');

        async function getProfileUsername(userId) {

            const { data } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('id', userId)
                .single();

            return data?.username || 'Unknown';
        }

        loginBtn.addEventListener('click', async () => {

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: emailInput.value,
                password: passwordInput.value
            });

            if (error) {
                alert(error.message);
                return;
            }

            location.reload();
        });

        signupBtn.addEventListener('click', async () => {

            const username = prompt('Choose username:');

            if (!username) return;

            const { data, error } = await supabaseClient.auth.signUp({
                email: emailInput.value,
                password: passwordInput.value
            });

            if (error) {
                alert(error.message);
                return;
            }

            const user = data.user;

            if (user) {

                await supabaseClient
                    .from('profiles')
                    .insert([{
                        id: user.id,
                        username: username
                    }]);
            }

            alert('Account created!');
        });

        logoutBtn.addEventListener('click', async () => {

            await supabaseClient.auth.signOut();

            location.reload();
        });

        window.ChatEngine = {

            containerId: 'chat-container',
            _renderedIds: new Set(),

            onNewMessage: function(msg) {

                const p = document.createElement('div');

                p.className = 'message';

                p.innerHTML = `
                    [<small>${msg.date} ${msg.time}</small>]
                    <b>${msg.username}:</b>
                    <span style="word-break: break-word;">
                        ${msg.text}
                    </span>
                `;

                chatContainer.appendChild(p);

                window.scrollTo(0, document.body.scrollHeight);
            },

            onClearChat: function() {
                chatContainer.innerHTML = '';
            },

            _renderHistoryBanner: function() {

                if (document.getElementById('engine-history-banner')) return;

                const banner = document.createElement('div');

                banner.id = 'engine-history-banner';
                banner.className = 'history-info';

                banner.innerText = 'Showing last 10 messages — click to load more';

                banner.addEventListener('click', () => {
                    this.loadFullHistory();
                });

                chatContainer.prepend(banner);
            },

            _removeHistoryBanner: function() {

                const banner = document.getElementById('engine-history-banner');

                if (banner) banner.remove();
            },

            _processAndEmit: function(rawMsg) {

                if (this._renderedIds.has(rawMsg.id)) return;

                this._renderedIds.add(rawMsg.id);

                const dateObj = new Date(rawMsg.created_at);

                const safeMessage = {

                    id: rawMsg.id,

                    username: rawMsg.profiles?.username || 'Unknown',

                    text: DOMPurify.sanitize(rawMsg.content, {

                        ALLOWED_TAGS: [
                            'b',
                            'i',
                            'u',
                            'strong',
                            'em',
                            'img',
                            'a',
                            'br',
                            'code'
                        ],

                        ALLOWED_ATTR: [
                            'src',
                            'href',
                            'target',
                            'alt'
                        ]
                    }),

                    date: dateObj.toLocaleDateString('uk-UA', {
                        day: '2-digit',
                        month: '2-digit',
                        year: '2-digit'
                    }),

                    time: dateObj.toLocaleTimeString('uk-UA', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    })
                };

                this.onNewMessage(safeMessage);
            },

            init: async function() {

                const { data } = await supabaseClient
                    .from(TABLE_NAME)
                    .select(`
                        *,
                        profiles(username)
                    `)
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (data) {

                    data.reverse().forEach(msg => {
                        this._processAndEmit(msg);
                    });

                    if (data.length >= 10) {
                        this._renderHistoryBanner();
                    }
                }

                supabaseClient
                    .channel('public:messages')
                    .on(
                        'postgres_changes',
                        {
                            event: 'INSERT',
                            schema: 'public',
                            table: 'messages'
                        },

                        async payload => {

                            const msg = payload.new;

                            const username = await getProfileUsername(msg.user_id);

                            this._processAndEmit({
                                ...msg,
                                profiles: {
                                    username
                                }
                            });
                        }
                    )
                    .subscribe();
            },

            loadFullHistory: async function() {

                const { data } = await supabaseClient
                    .from(TABLE_NAME)
                    .select(`
                        *,
                        profiles(username)
                    `)
                    .order('created_at', { ascending: true });

                this._renderedIds.clear();

                this.onClearChat();

                this._removeHistoryBanner();

                data.forEach(msg => {
                    this._processAndEmit(msg);
                });
            },

            send: async function(content) {

                const { data: { user } } = await supabaseClient.auth.getUser();

                if (!user) {
                    alert('Login first');
                    return;
                }

                const { error } = await supabaseClient
                    .from(TABLE_NAME)
                    .insert([{
                        user_id: user.id,
                        content: content
                    }]);

                if (error) {
                    console.error(error);
                }
            }
        };

        chatForm.addEventListener('submit', async function(event) {

            event.preventDefault();

            const text = messageInput.value.trim();

            if (!text) return;

            await ChatEngine.send(text);

            messageInput.value = '';
        });

        ChatEngine.init();

    </script>

</body>
</html>
