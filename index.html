<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biver</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* 🔥 YOUR ORIGINAL STYLES — NOT CHANGED */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #3b4a1f, #1f2a12);
            color: #f3e7b3;
            font-family: 'Trebuchet MS';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 25px;

            background: rgba(25, 35, 12, 0.9);
            backdrop-filter: blur(10px);

            border-bottom: 1px solid #d6b65a;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-size: 34px;
            background: linear-gradient(90deg, #ffde84, #f9dd8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 13px;
            color: #ffe9a3;
            opacity: 0.8;
        }

        #auth-box {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        #auth-box input,
        #message {
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid #d6b65a;
            background: #1f2a12;
            color: #ffe9a3;
            outline: none;
        }

        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }

        #chat-container {
            margin-top: 110px;
            margin-bottom: 80px;

            flex: 1;
            padding: 25px;

            overflow-y: auto;

            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            background: linear-gradient(135deg, #2f3a17, #1c250f);

            border: 1px solid #d6b65a;
            border-radius: 14px;

            padding: 14px 18px;

            max-width: 80%;
            width: fit-content;

            color: #ffe9a3;
            line-height: 1.5;
        }

        #chat-form {
            position: fixed;
            bottom: 0;
            width: 100%;

            display: flex;
            gap: 10px;

            padding: 15px;

            background: rgba(25, 35, 12, 0.95);
            backdrop-filter: blur(10px);

            border-top: 1px solid #d6b65a;
        }

        #message {
            flex: 1;
        }

        .history-info {
            margin: 0 25px 14px;
            padding: 12px 16px;

            border-radius: 12px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            text-align: center;
            font-size: 14px;
            font-weight: 600;

            cursor: pointer;
            transition: 0.3s ease;
        }

        .history-info:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }

        #current-user {
            color: #ffe9a3;
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        /* MOBILE */
        @media (max-width: 700px) {

            .top-bar {
                flex-direction: column;
                align-items: stretch;

                gap: 14px;

                padding: 16px;
            }

            .brand {
                align-items: center;
                text-align: center;
            }

            .brand h1 {
                font-size: 30px;
            }

            .brand span {
                font-size: 12px;
            }

            #auth-box {
                display: grid;

                grid-template-columns: 1fr 1fr auto;

                gap: 8px;
                align-items: center;
            }

            #email,
            #password {
                width: 100%;
                min-width: 0;
            }

            .auth-buttons {
                display: grid;

                grid-template-columns: 1fr 1fr 1fr;

                gap: 8px;
            }

            .auth-buttons button {
                width: 100%;
            }

            #chat-container {
                margin-top: 250px;
                margin-bottom: 90px;
            }

            #chat-form {
                padding: 12px;
            }

            #message {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">

        <div class="brand">
            <h1>Biver</h1>
            <span>a shitty html parody</span>
        </div>

        <div id="auth-box">

            <input type="email" id="email" placeholder="email">

            <input type="password" id="password" placeholder="password">

            <div id="current-user">
                Not logged in
            </div>

        </div>

        <div class="auth-buttons">

            <button id="login-btn">Login</button>

            <button id="signup-btn">Sign up</button>

            <button id="logout-btn">Logout</button>

        </div>

    </div>

    <div id="chat-container"></div>

    <form id="chat-form">

        <input type="text" id="message" placeholder="Write text or HTML..." required>

        <button type="submit">Send</button>

    </form>

    <script src="ChatEngine.js"></script>
    <script src="script.js"></script>

</body>
</html>
