<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biver</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #3b4a1f, #1f2a12);
            color: #f3e7b3;
            font-family: 'Trebuchet MS';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 25px;

            background: rgba(25, 35, 12, 0.9);
            backdrop-filter: blur(10px);

            border-bottom: 1px solid #d6b65a;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-size: 34px;
            background: linear-gradient(90deg, #ffde84, #f9dd8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 13px;
            color: #ffe9a3;
            opacity: 0.8;
        }

        /* SETTINGS BUTTON */
        .settings-btn {
            width: 42px;
            height: 42px;

            border-radius: 10px;
            border: 2px solid #d6b65a;

            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;

            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 18px;

            transition: 0.2s ease;
        }

        .settings-btn:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
            transform: scale(1.05);
        }

        #chat-container {
            margin-top: 110px;
            margin-bottom: 80px;
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            background: linear-gradient(135deg, #2f3a17, #1c250f);
            border: 1px solid #d6b65a;
            border-radius: 14px;
            padding: 14px 18px;
            max-width: 80%;
            width: fit-content;
            color: #ffe9a3;
            line-height: 1.5;
        }

        #chat-form {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(25, 35, 12, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #d6b65a;
        }

        #message {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #d6b65a;
            background: #1f2a12;
            color: #ffe9a3;
        }

        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #d6b65a;
            background: linear-gradient(135deg, #3a4620, #1f2a12);
            color: #ffe9a3;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(135deg, #4a5a2a, #2a3315);
        }

        /* SETTINGS PANEL */
        .settings-panel {
    position: fixed;
    top: 0;
    right: 0;

    width: 300px;
    height: 100vh;

    background: #1f2a12;
    border-left: 2px solid #d6b65a;

    transform: translateX(100%);
    transition: transform 0.3s ease;

    z-index: 9999;
}

.settings-panel.open {
    transform: translateX(0);
}0;
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
        }

        .tab-buttons button {
            flex: 1;
            font-size: 12px;
        }

        .tab-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hidden {
            display: none;
        }

    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">

        <div class="brand">
            <h1>Biver</h1>
            <span>a shitty html parody</span>
        </div>

        <button id="settings-btn" class="settings-btn">⚙</button>

    </div>

    <!-- CHAT -->
    <div id="chat-container"></div>

    <!-- INPUT -->
    <form id="chat-form">
        <input type="text" id="message" placeholder="Write text or HTML..." required>
        <button type="submit">Send</button>
    </form>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel">

        <div class="tab-buttons">
            <button data-tab="account">Account</button>
            <button data-tab="themes">Themes</button>
        </div>

        <div id="tab-account" class="tab-content">
            <input type="email" id="email" placeholder="email">
            <input type="password" id="password" placeholder="password">

            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign up</button>
            <button id="logout-btn">Logout</button>

            <div id="current-user"></div>
        </div>

        <div id="tab-themes" class="tab-content hidden">
            <p>Themes WIP</p>
        </div>

    </div>

    <script src="ChatEngine.js"></script>
    <script src="script.js"></script>

</body>
</html>
